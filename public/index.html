<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopee Thailand | ซื้อขายออนไลน์</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="header"></div>

  <main class="container">
    <!-- Banner -->
    <section class="banner-section">
      <div class="banner-wrapper" id="bannerArea">
        <div class="banner-main" id="bannerMain"></div>
        <div class="banner-side" id="bannerSide"></div>
      </div>
    </section>

    <!-- Categories -->
    <section class="categories-section">
      <div class="section-header">
        <h2 class="section-title">หมวดหมู่</h2>
      </div>
      <div class="categories-grid" id="categoriesGrid"></div>
    </section>

    <!-- Flash Sale -->
    <section class="flash-sale-section" id="flashSaleSection">
      <div class="flash-sale-header">
        <div class="flash-sale-title">
          <i class="fas fa-bolt"></i> Flash Sale
        </div>
        <div class="countdown">
          <span>ON NOW</span>
          <span class="countdown-box" id="cdH">00</span>:
          <span class="countdown-box" id="cdM">00</span>:
          <span class="countdown-box" id="cdS">00</span>
        </div>
        <a href="index.html?flashSale=true" style="margin-left:auto;color:var(--shopee-orange);font-size:14px;">ดูทั้งหมด →</a>
      </div>
      <div class="products-scroll" id="flashSaleProducts"></div>
    </section>

    <!-- All Products -->
    <section class="products-section">
      <div class="section-header">
        <h2 class="section-title" id="productsTitle">สินค้าแนะนำ</h2>
      </div>
      <div class="products-grid" id="productsGrid"></div>
      <div class="pagination" id="pagination"></div>
    </section>
  </main>

  <div id="footer"></div>
  <div id="authModalArea"></div>

  <script src="js/config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('header').innerHTML = getHeaderHTML();
    document.getElementById('footer').innerHTML = getFooterHTML();
    document.getElementById('authModalArea').innerHTML = getAuthModalHTML();
    updateUserUI();

    const params = new URLSearchParams(location.search);
    let currentPage = parseInt(params.get('page')) || 1;

    async function loadBanners() {
      const banners = await api('/banners');
      const main = document.getElementById('bannerMain');
      main.innerHTML = banners.map((b, i) => `
        <div class="banner-slide ${i === 0 ? 'active' : ''}">
          <a href="${b.link}"><img src="${b.image}" alt="${b.title}"></a>
        </div>
      `).join('') + `<div class="banner-dots">${banners.map((_, i) => `<div class="banner-dot ${i===0?'active':''}"></div>`).join('')}</div>`;
      document.getElementById('bannerSide').innerHTML = banners.slice(0, 2).map(b =>
        `<a href="${b.link}"><img src="${b.image}" alt="${b.title}"></a>`
      ).join('');
      initBannerSlider();
    }

    async function loadCategories() {
      const categories = await api('/categories');
      document.getElementById('categoriesGrid').innerHTML = categories.map(c => `
        <a href="index.html?category=${c.id}" class="category-item">
          <div class="category-icon">${c.icon}</div>
          <span class="category-name">${c.name}</span>
        </a>
      `).join('');
    }

    async function loadFlashSale() {
      const data = await api('/products?flashSale=true&limit=10');
      document.getElementById('flashSaleProducts').innerHTML = data.products.map(p => renderProductCard(p)).join('');
      if (!data.products.length) document.getElementById('flashSaleSection').style.display = 'none';
    }

    async function loadProducts() {
      const q = new URLSearchParams();
      if (params.get('category')) q.set('category', params.get('category'));
      if (params.get('search')) q.set('search', params.get('search'));
      if (params.get('flashSale')) q.set('flashSale', 'true');
      q.set('page', currentPage);
      q.set('limit', 15);

      const data = await api('/products?' + q.toString());
      document.getElementById('productsGrid').innerHTML = data.products.length
        ? data.products.map(p => renderProductCard(p)).join('')
        : '<div class="loading" style="grid-column:1/-1"><p>ไม่พบสินค้า</p></div>';

      if (params.get('search')) document.getElementById('productsTitle').textContent = `ผลการค้นหา "${params.get('search')}"`;
      else if (params.get('flashSale')) document.getElementById('productsTitle').textContent = 'Flash Sale';
      else if (params.get('category')) {
        api('/categories').then(cats => {
          const cat = cats.find(c => c.id === params.get('category'));
          if (cat) document.getElementById('productsTitle').textContent = cat.name;
        });
      }

      renderPagination(data.totalPages);
    }

    function renderPagination(totalPages) {
      const el = document.getElementById('pagination');
      if (totalPages <= 1) { el.innerHTML = ''; return; }
      let html = `<button ${currentPage <= 1 ? 'disabled' : ''} onclick="goPage(${currentPage-1})">‹</button>`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
      }
      html += `<button ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage+1})">›</button>`;
      el.innerHTML = html;
    }

    function goPage(p) {
      const q = new URLSearchParams(location.search);
      q.set('page', p);
      location.search = q.toString();
    }

    loadBanners();
    loadCategories();
    loadFlashSale();
    loadProducts();
    initCountdown();
  </script>
</body>
</html>
