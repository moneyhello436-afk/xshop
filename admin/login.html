<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Shopee</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <h2>🛒 Shopee Admin</h2>
      <p>ระบบจัดการหลังบ้าน</p>
      <div id="loginError" class="login-error"></div>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>อีเมล</label>
          <input type="text" id="email" value="admin@shopee.com" required>
        </div>
        <div class="form-group">
          <label>รหัสผ่าน</label>
          <input type="password" id="password" value="admin123" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;margin-top:8px;">
          <i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ
        </button>
      </form>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script>
    if (localStorage.getItem('admin_token')) location.href = ADMIN.home;
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        if (data.user.role !== 'admin') throw new Error('ไม่มีสิทธิ์เข้าถึง Admin');
        localStorage.setItem('admin_token', data.token);
        location.href = ADMIN.home;
      } catch (err) {
        document.getElementById('loginError').textContent = err.message;
      }
    }
  </script>
</body>
</html>
